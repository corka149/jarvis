services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: a_secret
      POSTGRES_DB: jarvis_dev
    ports:
      - 5432:5432

  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080

  db2:
    image: mongo:5.0.3
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: myadmin
      MONGO_INITDB_ROOT_PASSWORD: mypassword
    ports:
      - "27017:27017"
