services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: a_secret
      POSTGRES_DB: jarvis_dev
    ports:
      - 5432:5432

  redis:
    image: redis:latest
    ports:
      - 6379:6379
    command: [ "redis-server", "/etc/redis/redis.conf" ]
    volumes:
      - ./redis.conf:/etc/redis/redis.conf

  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080
